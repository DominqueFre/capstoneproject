{% extends "gamehome/base.html" %}
{% block content %}
  <h1>Leaderboard</h1>
  <table>
    <thead>
      <tr>
        <th>Player</th><th>Wins</th><th>Losses</th><th>Draws</th><th>Total</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.user__username }}</td>
        <td>{{ row.wins }}</td>
        <td>{{ row.losses }}</td>
        <td>{{ row.draws }}</td>
        <td>{{ row.total }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="5">No games yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
